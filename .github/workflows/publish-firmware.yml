name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware-snuffelaar:
    name: Build Firmware (snuffelaar)
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      #### Modify below here to match your project ####
      files: |
        snuffelaar.factory.yaml
      esphome-version: 2026.4.3
      combined-name: snuffelaar
      #### Modify above here to match your project ####

      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}
  
  build-firmware-p1-ultra-v2:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      #### Modify below here to match your project ####
      files: |
        p1-ultra-v2.factory.yaml
      esphome-version: 2026.4.3
      combined-name: p1-ultra-v2
      #### Modify above here to match your project ####

      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    needs:
      - build-firmware-snuffelaar
      - build-firmware-p1-ultra-v2
    with:
      version: ${{ github.event.release.tag_name }}
